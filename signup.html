<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SehatGuide AI - Signup</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1025;
      color: white;
    }

    .auth-bg {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 25px;
      box-shadow: 0 0 35px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    .auth-card h1 {
      margin: 0;
      font-size: 26px;
    }

    .auth-card p {
      margin-top: 6px;
      opacity: 0.8;
      font-size: 14px;
    }

    .auth-card label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-size: 14px;
      opacity: 0.9;
    }

    .auth-card input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      color: white;
      outline: none;
    }

    .auth-btn {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #00d4ff;
      font-weight: bold;
      font-size: 15px;
    }

    .auth-btn:hover {
      opacity: 0.9;
    }

    .auth-links {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.9;
      text-align: center;
    }

    .auth-links a {
      color: #00d4ff;
      text-decoration: none;
      font-weight: bold;
    }

    .msgBox {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="auth-bg">
    <div class="auth-card">
      <h1>📝 SehatGuide AI Signup</h1>
      <p>Create a new account to access the platform.</p>

      <form onsubmit="signupUser(event)">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter full name" required />

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email" required />

        <label>Password</label>
        <input type="password" id="password" placeholder="Create password" required />

        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm password" required />

        <button class="auth-btn" type="submit">Signup</button>

        <div id="msgBox" class="msgBox"></div>
      </form>

      <div class="auth-links">
        Already have an account?
        <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
